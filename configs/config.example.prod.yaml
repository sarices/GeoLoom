gateway:
  http_port: 8080
  socks_port: 1080

policy:
  strategy: urltest
  filter:
    allow: []
    block: []
  health_check:
    enabled: true
    interval: 5m
    url: http://cp.cloudflare.com
  refresh:
    enabled: true
    interval: 10m

geo:
  mmdb_path: ""
  mmdb_url: ""
  dns_timeout: 3s

api:
  enabled: true
  listen: 127.0.0.1:9090
  token: "CHANGE-ME"
  auth_header: X-GeoLoom-Token

state:
  enabled: true
  path: geoloom-state.json

sources:
  - name: remote-subscription
    type: source
    url: "https://example.com/subscribe?token=YOUR_TOKEN"
