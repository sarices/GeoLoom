# GeoLoom 示例配置（可复制为 config.yaml 后按需修改）

gateway:
  # 当前版本实际使用 socks_port 作为统一入口。
  http_port: 8080
  socks_port: 1080

policy:
  # 可选：random / urltest
  strategy: random
  filter:
    allow: []
    block: []
  health_check:
    enabled: true
    interval: 5m
    url: http://cp.cloudflare.com
  refresh:
    enabled: true
    interval: 10m

geo:
  mmdb_path: ""
  mmdb_url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-Country.mmdb"
  dns_timeout: 3s

api:
  enabled: true
  listen: 127.0.0.1:9090
  token: ""
  auth_header: X-GeoLoom-Token

state:
  enabled: true
  path: geoloom-state.json

sources:
  - name: local-file
    type: source
    url: "sub.txt"
